# Release Pipeline — Maher AI — QuantOps
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/maherai

jobs:
  # ─── Build & Push Docker Images ─────────────────────────
  release-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, ai-engine, market-service, news-service, sentiment, alert-service, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          DOCKERFILE="src/infra/docker/Dockerfile.${{ matrix.service }}"
          if [ -f "$DOCKERFILE" ]; then
            docker build \
              -t ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.version.outputs.VERSION }} \
              -t ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest \
              -f "$DOCKERFILE" .
            docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.version.outputs.VERSION }}
            docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          else
            echo "Dockerfile not found for ${{ matrix.service }} — skipping"
          fi

  # ─── Create GitHub Release ──────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: release-images
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          release_name: "Maher AI — QuantOps ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Maher AI — QuantOps ${{ steps.version.outputs.VERSION }}

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Docker Images
            ```
            ghcr.io/${{ github.repository_owner }}/maherai/gateway:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/maherai/ai-engine:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/maherai/market-service:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/maherai/dashboard:${{ steps.version.outputs.VERSION }}
            ```

            ### Installation
            See the [Deployment Guide](docs/deployment/README.md) for instructions.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-alpha') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-rc') }}
