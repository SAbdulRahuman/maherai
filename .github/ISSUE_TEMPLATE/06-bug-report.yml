name: "\U0001F41B Bug Report"
description: "Report a bug or defect."
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Help us fix issues by providing detailed information.

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of the bug."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to Reproduce"
      description: "Step-by-step instructions to reproduce the issue."
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
      description: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: "Actual Behavior"
      description: "What actually happens?"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Browser, OS, API version, etc."
      placeholder: |
        - OS: ...
        - Browser: ...
        - Maher AI Version: ...
        - API Endpoint: ...
        - Kubernetes Cluster: ...
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots / Logs"
      description: "Attach screenshots or paste relevant logs."
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      options:
        - "Critical - System down"
        - "High - Major feature broken"
        - "Medium - Workaround available"
        - "Low - Cosmetic issue"
    validations:
      required: true
